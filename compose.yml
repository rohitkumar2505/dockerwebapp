version: "3.9"
services:
 devopsdb:
   image: rohitkumar2505/login:db 
   ports:
     - "3306:3306"
   networks:
     - mynetwork
   deploy:
    replicas: 3

 application:
   image: rohitkumar2505/logout:app 
   ports:
     - "1111:8080"
   networks:
     - mynetwork
   deploy:
    replicas: 3
   depends_on:
     - devopsdb


networks:
  mynetwork:
    driver: overlay

